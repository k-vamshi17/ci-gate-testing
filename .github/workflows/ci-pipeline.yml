name: CI Pipeline

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    name: Lint Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: |
          echo "Installing project dependencies..."
          npm ci
          echo "Dependencies installed successfully."

      - name: Run ESLint
        run: |
          echo "Running lint validation..."
          npm run lint
          echo "Lint validation completed successfully."

  unit-tests:
    name: Unit Test Execution
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: |
          echo "Executing unit tests..."
          npm test -- --watchAll=false
          echo "Unit tests completed successfully."

  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks Secret Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Secret scan success message
        run: echo "Secret scan completed successfully."

  container-scan:
    name: Container Security Scan
    runs-on: ubuntu-latest
    needs: secret-scan

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          echo "Building Docker image..."
          docker build -t myapp:${{ github.sha }} .
          echo "Docker image built successfully."

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: myapp:${{ github.sha }}
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH

      - name: Container scan success message
        run: echo "Container vulnerability scan completed successfully."

  pipeline-summary:
    name: Pipeline Summary
    runs-on: ubuntu-latest
    needs:
      - lint
      - unit-tests
      - secret-scan
      - container-scan
    if: success()

    steps:
      - name: Publish summary
        run: |
          echo "## CI Pipeline Execution Summary" >> $GITHUB_STEP_SUMMARY
          echo "✅ Lint Check Passed" >> $GITHUB_STEP_SUMMARY
          echo "✅ Unit Tests Passed" >> $GITHUB_STEP_SUMMARY
          echo "✅ Secret Scan Passed" >> $GITHUB_STEP_SUMMARY
          echo "✅ Container Security Scan Passed" >> $GITHUB_STEP_SUMMARY
          echo "🎉 CI Pipeline completed successfully." >> $GITHUB_STEP_SUMMARY
